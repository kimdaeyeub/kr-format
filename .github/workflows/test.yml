name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Node.js 설정
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: 패키지 설치
        run: npm install

      - name: 테스트 실행
        run: npm run test:run
